services:
  - type: web
    name: smollm-mini
    env: python
    region: oregon
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:8080 --workers 1 --threads 2 --timeout 180
    autoDeploy: true
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.0"
      - key: HF_TOKEN
        sync: false
        # ↑ Setear manualmente en Render Dashboard
        # Obtener gratis en: huggingface.co → Settings → Access Tokens
      - key: GROQ_KEY
        sync: false
        # ↑ Opcional. Dejar vacío si no se quiere usar Groq como backup
