services:
  - type: web
    name: smollm-mini
    env: python
    region: oregon
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:8080 --workers 1 --threads 1 --timeout 120
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: HF_HOME
        value: /tmp/huggingface
      - key: PIP_NO_CACHE_DIR
        value: "1"
      - key: HF_API_TOKEN
        sync: false
    autoDeploy: true
